name: Desktop Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-22.04]

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Windows Dependencies
        if: matrix.os == 'windows-latest'
        run: |
          choco install make -y

      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev build-essential

      - name: Validate macOS Signing Secrets
        if: matrix.os == 'macos-latest' && startsWith(github.ref, 'refs/tags/')
        env:
          APPLE_DEVELOPER_ID_CERTIFICATE_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_BASE64 }}
          APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          APPLE_DEVELOPER_ID_APPLICATION_IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_IDENTITY }}
          APPLE_DEVELOPER_ID_INSTALLER_IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID_INSTALLER_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          missing=0
          for name in \
            APPLE_DEVELOPER_ID_CERTIFICATE_BASE64 \
            APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD \
            APPLE_DEVELOPER_ID_APPLICATION_IDENTITY \
            APPLE_DEVELOPER_ID_INSTALLER_IDENTITY \
            APPLE_ID \
            APPLE_TEAM_ID \
            APPLE_APP_SPECIFIC_PASSWORD
          do
            if [ -z "${!name}" ]; then
              echo "::error::$name is required for trusted macOS release signing and notarization."
              missing=1
            fi
          done
          exit "$missing"

      - name: Import macOS Developer ID Certificate
        if: matrix.os == 'macos-latest' && startsWith(github.ref, 'refs/tags/')
        env:
          APPLE_DEVELOPER_ID_CERTIFICATE_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_BASE64 }}
          APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/apple-developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          echo "$APPLE_DEVELOPER_ID_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security find-identity -v "$KEYCHAIN_PATH"

      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.13.0
          echo "$HOME/go/bin" >> $GITHUB_PATH
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Install Frontend Dependencies
        run: |
          cd desktop/frontend
          npm install

      - name: Package Application
        if: matrix.os != 'windows-latest'
        env:
          MAC_SIGNING_REQUIRED: ${{ matrix.os == 'macos-latest' && startsWith(github.ref, 'refs/tags/') && 'true' || 'false' }}
          MAC_NOTARIZE: ${{ matrix.os == 'macos-latest' && startsWith(github.ref, 'refs/tags/') && 'true' || 'false' }}
          MAC_SIGN_IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_IDENTITY }}
          MAC_INSTALLER_IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID_INSTALLER_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          cd desktop
          make embed-aiwf
          make package

      - name: Package Windows Application
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          cd desktop
          make embed-aiwf
          go run github.com/wailsapp/wails/v2/cmd/wails@v2.13.0 build -platform windows/amd64 -clean
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $version = (Get-Content ../MANIFEST.json | ConvertFrom-Json).version
          $exe = Get-ChildItem -Path build/bin -Filter *.exe | Select-Object -First 1
          if (-not $exe) {
            Get-ChildItem -Path build/bin -Recurse | Format-Table -AutoSize
            throw "No Windows executable found in desktop/build/bin"
          }
          Compress-Archive -Path $exe.FullName -DestinationPath "dist/aiwf-framework_${version}_windows_amd64.zip" -Force
          Get-ChildItem -Path dist | Format-Table -AutoSize

      - name: Verify Dist Folder
        run: |
          ls -lah desktop/dist/

      - name: Upload Artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: desktop/dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
